name: Daily Stock Analysis

on:
  schedule:
    # JST 15:35（東証大引け後）— 平日のみ（UTC 06:35）
    - cron: '35 6 * * 1-5'
    # JST 22:00（NY市場開場後）— 平日のみ（UTC 13:00）
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Claude Code CLI インストール
        run: npm install -g @anthropic-ai/claude-code

      - name: Python 依存ライブラリインストール
        run: pip install -r requirements.txt

      # ANTHROPIC_API_KEY 未設定でもテンプレート分析にフォールバックして動作する
      - name: 日次アセスメント実行
        run: python main.py --date today
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          GITHUB_PAGES_URL: https://oguogu-bit.github.io/stock-assessment

      # GitHub Pages 用ファイル生成（外部スクリプトに分離してYAMLエラーを回避）
      - name: GitHub Pages ファイル生成
        run: python scripts/build_pages.py $(date +%Y-%m-%d)

      # レポートをコミット・プッシュ
      - name: レポートをリポジトリにコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ docs/ data/news_patterns.csv logs/ 2>/dev/null || true
          git diff --cached --quiet && echo "変更なし — スキップ" && exit 0
          git commit -m "Daily report $(date +%Y-%m-%d)"
          git push

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Secrets 登録手順:
#   GitHub リポジトリ → Settings → Secrets and variables → Actions
#   → New repository secret
#
#   LINE_NOTIFY_TOKEN  : LINE Notify トークン（無料）
#   NEWS_API_KEY       : NewsAPI キー（任意・ローカルのみ有効）
#   SLACK_WEBHOOK_URL  : Slack Incoming Webhook（任意）
#   ANTHROPIC_API_KEY  : Anthropic API キー（任意・設定すると Claude AI 分析が有効）
#                        未設定でもテンプレート分析で動作します
#
# GitHub Pages:
#   Settings → Pages → Branch: main / docs フォルダ → Save
#   URL: https://oguogu-bit.github.io/stock-assessment/
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
